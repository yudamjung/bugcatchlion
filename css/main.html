<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lion.css">
    <link rel="stylesheet" href="randomMove.css">
    <link rel="stylesheet" href="shadow.css">
    <title>bugcatchlion</title>


</head>

<body>


    <div class="yelin_introduce">
        <div class="modal_body">
            <h2>모달창 제목</h2>
            <p>모달창 내용</p>
            <div>
                <button class="close"><img src="media/close.png" alt="닫기버튼" height="30px" width="30px"></button>
            </div>
        </div>
    </div>

    <button class="btn-open-modal">Modal 열기</button>

    <script>
        const modal = document.querySelector('.yelin_introduce');
        const btnOpenModal = document.querySelector('.btn-open-modal');
        const closeBtn = document.querySelector('.close');


        btnOpenModal.addEventListener("click", () => {
            modal.style.display = "flex";
        });


        closeBtn.addEventListener("click", () => {
            modal.style.display = "none";
        });


        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });
    </script>

</body>

</html>
