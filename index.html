<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="shadow.css">
    <link rel="stylesheet" href="lion.css">
    <title>버그잡는사자</title>
</head>

<body>
    <div class="bgimg">
        <img src="media/background.png">
    </div>
    <div class="bug" data-modal="modal1">
        <img id="bug1" src="media/bug1.png">
    </div>

    <div class="bug" data-modal="modal2">
        <img id="bug2" src="media/bug2.png">
    </div>

    <div class="bug" data-modal="modal3">
        <img id="bug3" src="media/bug3.png">

    <div class="bug" data-modal="modal4">
        <img id="bug4" src="media/bug4.png">
    </div>

    <!-- 팀원별 모달창 자기소개 -->
    <div class="modal yelin_introduce" id="modal1">
        <div class="modal_body">
            <h2>🙋 채예린</h2>
            <p>안녕하세요! 디지털미디어학과 3학년 채예린입니다.</p>
            <button class="close"><img src="media/close.png" width="30px" height="30px"></button>
        </div>
    </div>

    <div class="modal yudam_introduce" id="modal2">
        <div class="modal_body">
            <h2>🙋 정유담</h2>
            <p>안녕하세요! 소프트웨어융합학과 2학년 정유담입니다.</p>

    <div class="modal gayoon_introduce" id="modal3">
        <div class="modal_body">
            <h2>🙋 장가윤</h2>

            <button class="close"><img src="media/close.png" width="30px" height="30px"></button>
        </div>
    </div>


    <div class="modal uiji_introduce" id="modal4">
        <div class="modal_body">
            <h2>🙋 김의지</h2>
            <p>안녕하세요! 디지털미디어학과 2학년 김의지 입니다.</p>
            <button class="close"><img src="media/close.png" width="30px" height="30px"></button>
        </div>
    </div>


    <script src="script.js"></script>
    <script src="shadow.js"></script>
    <script src="modal.js"></script>

</body>

</html>
